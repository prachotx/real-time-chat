services:
  api:
    container_name: ${API_CONTAINER}-dev
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./api/.env
    ports:
      - "${API_PORT}:3000"
    volumes:
      - .:/app
      - /app/tmp

  web:
    container_name: ${WEB_CONTAINER}-dev
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./web/.env
    ports:
      - "${WEB_PORT}:4200"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api

  db:
    image: postgres:16
    container_name: ${DB_CONTAINER}-dev
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: ${PGADMIN_CONTAINER}-dev
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db

volumes:
  postgres_data:
